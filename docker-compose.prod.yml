version: '3.8'

# ============================================================
# Docker Compose — Production
# Images pré-construites depuis GitHub Container Registry
# Usage : docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ── Base de données PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ravec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DATABASE:-ravec_db}
      POSTGRES_USER:     ${DATABASE_USER:-ravec_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Ne pas exposer le port en dehors du réseau Docker en production
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-ravec_user} -d ${DATABASE:-ravec_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ravec-network

  # ── Backend Spring Boot ─────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/lamarana55/ravec-backend:latest}
    container_name: ravec-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Base de données (utilise le réseau Docker interne → port 5432)
      DATABASE_IP:       postgres
      DATABASE_PORT:     5432
      DATABASE:          ${DATABASE:-ravec_db}
      DATABASE_USER:     ${DATABASE_USER:-ravec_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DDL_AUTO:          ${DDL_AUTO:-update}

      # Serveur
      SERVER_PORT:  8091
      FRONT_URL:    ${FRONT_URL:-https://votre-domaine.com}

      # Sécurité
      JWT_SECURITY: ${JWT_SECURITY}

      # Email
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD:  ${SPRING_MAIL_PASSWORD}

      # JVM
      JAVA_OPTS: -Xms512m -Xmx1024m -XX:+UseG1GC -XX:+UseContainerSupport
    expose:
      - "8091"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8091/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - ravec-network

  # ── Frontend Angular (Nginx static + proxy API) ─────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/lamarana55/ravec-frontend:latest}
    container_name: ravec-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # Nginx écoute sur 80 ; Nginx/Certbot sur le host gère le SSL
      - "80:80"
    networks:
      - ravec-network

  # ── PgAdmin (optionnel, profil "tools") ────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ravec-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@ravec.gov.gn}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT:      80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - ravec-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  backend_logs:
    driver: local

networks:
  ravec-network:
    driver: bridge
