# ============================================================
# Nginx — PN-RAVEC nouvelle instance
# Accessible sur : https://validation.ravec.gov.gn:8050
# Réutilise le certificat SSL existant du même domaine
# À placer dans : /etc/nginx/sites-available/ravec-pn
# Lien symbolique : ln -s /etc/nginx/sites-available/ravec-pn /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 8050 ssl;
    server_name validation.ravec.gov.gn;

    # Réutilisation du certificat Let's Encrypt existant
    ssl_certificate     /etc/letsencrypt/live/validation.ravec.gov.gn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/validation.ravec.gov.gn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Limite de taille des requêtes (documents numérisés)
    client_max_body_size 200M;

    # Tout le trafic → container frontend Docker (Angular + proxy /api/)
    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_body_buffer_size 256k;
        proxy_request_buffering off;

        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        client_body_timeout   300s;
    }

    access_log /var/log/nginx/ravec-pn-access.log;
    error_log  /var/log/nginx/ravec-pn-error.log;
}
