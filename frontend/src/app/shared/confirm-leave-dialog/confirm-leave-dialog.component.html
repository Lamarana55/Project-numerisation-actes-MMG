<div class="dialog-wrapper">

  <!-- Bande décorative -->
  <div class="accent-bar"></div>

  <!-- Icône centrale -->
  <div class="icon-ring">
    <mat-icon>warning_amber</mat-icon>
  </div>

  <!-- Corps -->
  <div class="dialog-body">
    <h2 class="dialog-title">{{ data.title }}</h2>
    <p class="dialog-message">{{ data.message }}</p>

    <!-- Bloc d'avertissement -->
    <div class="warning-block">
      <mat-icon>info_outline</mat-icon>
      <span>Cette action est irréversible. Les données saisies ne seront pas récupérables.</span>
    </div>
  </div>

  <!-- Actions -->
  <div class="dialog-actions">
    <button mat-stroked-button class="btn-stay" (click)="cancel()">
      <mat-icon>edit_note</mat-icon>
      {{ data.labelCancel }}
    </button>
    <button mat-flat-button class="btn-leave" (click)="confirm()">
      <mat-icon>logout</mat-icon>
      {{ data.labelConfirm }}
    </button>
  </div>

</div>
