<div class="phone-wrapper">
  <mat-form-field appearance="outline" class="phone-field">
    <mat-label>Indicatif pays</mat-label>
    <mat-select
      [value]="selectedDialCode"
      (selectionChange)="onDialCodeChange($event.value)"
      [disabled]="isDisabled">
      <mat-option *ngFor="let c of countries" [value]="c.dialCode">
        {{ c.flag }} {{ c.name }} ({{ c.dialCode.replace('CA', '') }})
      </mat-option>
    </mat-select>
    <mat-icon matSuffix>flag</mat-icon>
  </mat-form-field>

  <mat-form-field appearance="outline" class="phone-field" [class.phone-invalid]="!!formatError && touched">
    <mat-label>{{ label }}</mat-label>
    <input
      matInput
      type="tel"
      [placeholder]="placeholder"
      [value]="localNumber"
      (input)="onNumberInput($any($event.target).value)"
      [disabled]="isDisabled"
      autocomplete="tel-national">
    <mat-hint *ngIf="hint && !formatError" align="end">{{ hint }}</mat-hint>
    <mat-icon matSuffix>phone</mat-icon>
  </mat-form-field>

  <div class="phone-error-msg" *ngIf="formatError && touched">
    {{ formatError }}
  </div>
</div>
