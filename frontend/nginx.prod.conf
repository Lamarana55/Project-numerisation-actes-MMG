# Nginx config embarquée dans l'image frontend (production)
# Sert les fichiers Angular statiques ET proxy l'API vers le backend

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;

    # Cache pour les assets (hash dans le nom = immutable)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Santé Nginx (utilisé par le healthcheck Docker)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Proxy API vers le backend Spring Boot
    location /api/ {
        proxy_pass         http://backend:8091;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Désactiver le buffering pour les SSE/streaming si nécessaire
        proxy_buffering off;
    }

    # Toutes les routes Angular → index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
