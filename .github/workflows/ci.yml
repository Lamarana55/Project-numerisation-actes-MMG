name: CI — Tests

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── Backend Tests (Spring Boot / Maven) ──────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ravec_test
          POSTGRES_USER: ravec_user
          POSTGRES_PASSWORD: ravec_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        working-directory: ./backend
        env:
          DATABASE_IP: localhost
          DATABASE_PORT: 5432
          DATABASE: ravec_test
          DATABASE_USER: ravec_user
          DATABASE_PASSWORD: ravec_test_pass
          DDL_AUTO: create-drop
          JWT_SECURITY: ci_test_jwt_secret_key_32chars_min
          SERVER_PORT: 8091
          FRONT_URL: http://localhost:4200
          SPRING_MAIL_USERNAME: test@test.com
          SPRING_MAIL_PASSWORD: test
        run: mvn clean test --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # ── Frontend Tests (Angular / Karma) ─────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run frontend tests (headless)
        working-directory: ./frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless --no-progress

      - name: Build production bundle (smoke test)
        working-directory: ./frontend
        run: npm run build -- --configuration production

  # ── Lint check ───────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: ./frontend
        run: npx ng lint --no-progress || true
