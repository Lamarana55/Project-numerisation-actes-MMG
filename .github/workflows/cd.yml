name: CD — Build & Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ravec-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ravec-frontend

jobs:
  # ── Build & Push Docker images ────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Deploy to Ubuntu server ───────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code (for compose file)
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "docker-compose.prod.yml,nginx/nginx.conf"
          target: "/opt/pn-ravec"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: BACKEND_IMAGE,FRONTEND_IMAGE
          script: |
            set -e
            cd /opt/pn-ravec

            # Authenticate to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.SERVER_USER }}" --password-stdin

            # Inject image tags into env
            echo "BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}" >> .env
            echo "FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}" >> .env

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Rolling restart (zero-downtime for stateless services)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up dangling images
            docker image prune -f

            echo "Deployment complete — commit ${{ github.sha }}"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "Waiting for backend health..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8091/api/v1/actuator/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "Backend healthy."
                exit 0
              fi
              echo "Attempt $i/12 — status $STATUS, retrying in 10s..."
              sleep 10
            done
            echo "Health check failed after 2 minutes."
            exit 1

  # ── Notify on failure ─────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "Pipeline failed on commit ${{ github.sha }} by ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Remplacer par un webhook Slack/Teams/email si disponible
